<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credivip - Contactos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .contenedor {
            max-width: 500px;
            margin: auto;
        }

        .logo {
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: #666;
            margin-bottom: 35px;
            font-size: 20px;
        }

        .boton {
            display: block;
            background: #25D366;
            color: white;
            text-decoration: none;
            margin: 20px 0;
            padding: 25px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            transition: 0.3s;
        }

        .boton:hover {
            transform: scale(1.03);
        }

        .numero {
            display: block;
            font-size: 20px;
            font-weight: normal;
            margin-top: 8px;
        }

        .pie {
            margin-top: 50px;
            color: #777;
            font-size: 22px;
        }

    </style>
</head>

<body>

    <div class="contenedor">

        <img src="logo.png" class="logo" alt="Credivip">

        <h1>Seleccione el sector</h1>

        <div class="subtitulo">
            Elija a quién desea contactar por WhatsApp
        </div>

        <a class="boton"
            href="https://wa.me/5493624157914">
            💰 Cobranza
            <span class="numero">362 415 7914</span>
        </a>

        <a class="boton"
            href="https://wa.me/5493624857913">
            🛠 Soporte Técnico
            <span class="numero">362 485 7913</span>
        </a>

        <a class="boton"
            href="https://wa.me/5493625180780">
            🛒 Ventas
            <span class="numero">362 518 0780</span>
        </a>

        <div class="pie">
            ❤️ Gracias por contactarnos
        </div>

    </div>

</body>
</html>
