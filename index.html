<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credivip - Contacto por WhatsApp</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #f5f5f5, #e5e5e5);
            padding: 20px;
            text-align: center;
        }

        .contenedor {
            max-width: 500px;
            margin: auto;
        }

        .logo {
            width: 90%;
            max-width: 420px;
            margin: 20px 0;
        }

        h1 {
            color: #222;
            font-size: 42px;
            margin-bottom: 15px;
        }

        .subtitulo {
            color: #666;
            font-size: 22px;
            margin-bottom: 35px;
        }

        .boton {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,.20);
            transition: .3s;
        }

        .boton:hover {
            transform: translateY(-4px);
        }

        .icono {
            font-size: 48px;
        }

        .texto {
            flex: 1;
            text-align: left;
            margin-left: 20px;
        }

        .titulo {
            font-size: 34px;
            font-weight: bold;
        }

        .numero {
            font-size: 22px;
            margin-top: 8px;
        }

        .whatsapp {
            font-size: 54px;
        }

        .pie {
            margin-top: 40px;
            color: #666;
            font-size: 24px;
        }

        @media(max-width:500px){

            h1{
                font-size:32px;
            }

            .titulo{
                font-size:28px;
            }

            .numero{
                font-size:18px;
            }

            .icono,
            .whatsapp{
                font-size:40px;
            }
        }

    </style>
</head>

<body>

<div class="contenedor">

    <img src="logo.png" class="logo" alt="Credivip">

    <h1>Seleccione el sector</h1>

    <div class="subtitulo">
        Elija a quién desea contactar
    </div>

    <a class="boton"
       href="https://wa.me/5493624157914?text=Hola,%20quiero%20realizar%20una%20consulta%20sobre%20cobranza.">

        <div class="icono">💰</div>

        <div class="texto">
            <div class="titulo">Cobranza</div>
            <div class="numero">362 415 7914</div>
        </div>

        <div class="whatsapp">📱</div>

    </a>


    <a class="boton"
       href="https://wa.me/5493624857913?text=Hola,%20necesito%20soporte%20técnico.">

        <div class="icono">🛠️</div>

        <div class="texto">
            <div class="titulo">Soporte Técnico</div>
            <div class="numero">362 485 7913</div>
        </div>

        <div class="whatsapp">📱</div>

    </a>


    <a class="boton"
       href="https://wa.me/5493625180780?text=Hola,%20quiero%20realizar%20una%20consulta%20de%20ventas.">

        <div class="icono">🛒</div>

        <div class="texto">
            <div class="titulo">Ventas</div>
            <div class="numero">362 518 0780</div>
        </div>

        <div class="whatsapp">📱</div>

    </a>

    <div class="pie">
        ❤️ Gracias por contactarnos
    </div>

</div>

</body>
</html>
